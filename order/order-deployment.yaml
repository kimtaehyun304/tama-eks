apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: 277707114689.dkr.ecr.ap-northeast-2.amazonaws.com/tama-api/order:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002